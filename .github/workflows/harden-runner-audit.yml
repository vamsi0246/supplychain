name: harden-runner-audit-demo
on: [push, workflow_dispatch]
permissions:
  contents: read
jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (block mode)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make an outbound call to allowed endpoints only
        run: |
          curl -sS https://api.ipify.org
          echo
          echo "Made an outbound call to https://api.ipify.org"
          curl -sS https://api.masscan.cloud
          echo
          echo "Making an outbound call to Global blocking list"