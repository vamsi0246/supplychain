name: harden-runner-audit-demo
on: [push, workflow_dispatch]
permissions:
  contents: read
jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner (block mode)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.ipify.org:443
      - name: Checkout
        uses: actions/checkout@v4
      - name: Make an outbound call to allowed endpoints only
        run: |
          curl -sS https://api.ipify.org
          echo
          echo "Made an outbound call to https://api.ipify.org"
          curl -sS https://checkip.amazonaws.com
          echo
          echo "Made an outbound call to https://checkip.amazonaws.com"